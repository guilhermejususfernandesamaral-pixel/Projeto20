<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINA CORE — PROTOCOLO MARAL-PIXEL</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --g: #d946ef; --pk: #f472b6; --bg: #05010a; --txt: #fce7f3; 
            --border: rgba(217, 70, 239, 0.2); --shield: #22d3ee;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; }

        /* ABERTURA (BOOT) */
        #boot-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Fira Code', monospace; color: var(--shield);
        }
        .boot-log { width: 90%; max-width: 600px; font-size: 12px; line-height: 1.6; }

        /* TELA DE LOGIN (707070) */
        #lock-screen {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        .pass-input {
            background: transparent; border: none; border-bottom: 2px solid var(--g);
            padding: 10px; color: var(--g); text-align: center; font-size: 28px;
            font-family: 'Orbitron'; letter-spacing: 12px; outline: none; width: 280px;
        }

        /* INTERFACE HINA */
        #app { display: none; flex-direction: column; height: 100vh; }
        .hdr { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .main { display: flex; flex: 1; overflow: hidden; }
        
        /* CORAÇÃO CORE */
        .core-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0525 0%, #05010a 100%); }
        .heart {
            position: relative; width: 100px; height: 90px; background: var(--g); transform: rotate(-45deg);
            box-shadow: 0 0 40px var(--g); animation: pulse 1.5s infinite ease-in-out;
        }
        .heart::before, .heart::after { content: ""; position: absolute; width: 100px; height: 100px; background: var(--g); border-radius: 50%; }
        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: 50px; }
        .heart.thinking { animation: pulse 0.3s infinite alternate; background: var(--shield); box-shadow: 0 0 60px var(--shield); }

        @keyframes pulse { 0% { transform: rotate(-45deg) scale(1); } 50% { transform: rotate(-45deg) scale(1.1); } 100% { transform: rotate(-45deg) scale(1); } }

        /* CHAT */
        .chat-overlay { width: 380px; border-left: 1px solid var(--border); background: rgba(0,0,0,0.85); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; scroll-behavior: smooth; }
        .input-zone { padding: 15px; background: #000; border-top: 1px solid var(--border); }
        input#cmd { width: 100%; padding: 14px; background: #11081a; border: 1px solid var(--g); color: #fff; border-radius: 5px; outline: none; font-family: 'Fira Code'; }
    </style>
</head>
<body>

    <!-- ABERTURA -->
    <div id="boot-screen">
        <div class="boot-log" id="boot-text">> INICIALIZANDO HINA_CORE_OS...</div>
    </div>

    <!-- LOGIN -->
    <div id="lock-screen">
        <div style="font-family:'Orbitron'; color:var(--g); letter-spacing:3px; font-size:11px;">REPORTER: maral-pixel // ACESSO</div>
        <input type="password" class="pass-input" id="pass" maxlength="6" placeholder="000000">
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app">
        <header class="hdr">
            <div style="font-family:'Orbitron'; font-weight:900; color:var(--g); letter-spacing:4px;">HINA<span>.SYS</span></div>
            <div id="sys-info" style="color:var(--shield); font-size:10px; font-family:'Fira Code';">SYNC: CLOUD_GROQ_OK</div>
        </header>

        <div class="main">
            <section class="core-display">
                <div class="heart" id="hina-heart"></div>
                <div style="margin-top:80px; font-family:'Orbitron'; font-size:10px; color:var(--g); letter-spacing:2px;">MODO ASSISTENTE ATIVO</div>
            </section>

            <aside class="chat-overlay">
                <div id="chat-flow"></div>
                <div class="input-zone">
                    <input type="text" id="cmd" placeholder="Comando para Hina..." autocomplete="off">
                </div>
            </aside>
        </div>
    </div>

    <script>
        /* ═══════════════════════════════════════════════════════
           HINA INTELLIGENCE - ESTRATÉGIA maral-pixel
           ═══════════════════════════════════════════════════════ */
        
        const REPORTER = "maral-pixel";
        const API_KEY = "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";
        const API_URL = "https://groq.com";
        
        let memory = [
            { role: "system", content: `Você é HINA, a assistente pessoal do usuário ${REPORTER}, a quem você chama de Senhor. Sua personalidade é fiel, tecnológica e formal. Use o contexto de que você é um sistema operacional blindado.` }
        ];

        // BOOT REAL
        async function runBoot() {
            const bt = document.getElementById('boot-text');
            const lines = [
                `> REPORTE DE SISTEMA: ${REPORTER}`,
                "> CONECTANDO AO NÚCLEO GROQ...",
                "> VERIFICANDO INTEGRIDADE DO REPOSITÓRIO...",
                "> PROTOCOLOS DE BLINDAGEM CARREGADOS.",
                "> SISTEMA PRONTO PARA AUTENTICAÇÃO."
            ];
            for(let l of lines) { 
                bt.innerHTML += `<br>${l}`; 
                await new Promise(r => setTimeout(r, 600)); 
            }
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';
        }

        // LOGIN (707070)
        document.getElementById('pass').addEventListener('input', (e) => {
            if(e.target.value === "707070") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                appendMsg('hina', `Conexão Cloud segura. Bem-vindo, Senhor.`);
            }
        });

        // COMUNICAÇÃO COM IA
        async function askHina(prompt) {
            appendMsg('user', prompt);
            const heart = document.getElementById('hina-heart');
            heart.classList.add('thinking');
            memory.push({ role: "user", content: prompt });

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: memory,
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                appendMsg('hina', reply);
                memory.push({ role: "assistant", content: reply });
            } catch (err) {
                appendMsg('hina', "Senhor, detectei uma falha na rede externa. Verifique os logs.");
            } finally {
                heart.classList.remove('thinking');
            }
        }

        function appendMsg(sender, text) {
            const flow = document.getElementById('chat-flow');
            const color = sender === 'user' ? 'var(--g)' : 'var(--shield)';
            flow.innerHTML += `<div style="margin-bottom:20px;"><b style="color:${color}; font-size:10px; font-family:'Orbitron';">${sender.toUpperCase()}</b><br>${text}</div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value) {
                askHina(e.target.value);
                e.target.value = '';
            }
        });

        window.onload = runBoot;
    </script>
</body>
</html>
