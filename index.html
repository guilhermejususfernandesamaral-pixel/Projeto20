<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINA CORE — INTERFACE ALPHA</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --g: #d946ef; --bg: #030105; --shield: #22d3ee; --border: rgba(34, 211, 238, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Fira Code', monospace; background: var(--bg); color: var(--shield); height: 100vh; overflow: hidden; }

        /* BOOT & LOGIN */
        #boot-screen, #lock-screen { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-screen { display: none; z-index: 9999; }
        .pass-input { background: none; border: 1px solid var(--shield); padding: 15px; color: var(--shield); text-align: center; font-size: 20px; font-family: 'Orbitron'; letter-spacing: 5px; outline: none; }

        /* LAYOUT PRINCIPAL */
        #app { display: none; flex-direction: column; height: 100vh; background: radial-gradient(circle, #0a0412 0%, #030105 100%); }
        
        .hdr { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 2px; }

        /* NÚCLEO DE ENERGIA (NOVA INTERFACE) */
        .main-engine { flex: 1; display: flex; position: relative; }
        .visualizer { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative; }
        
        .ring-container { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; }
        
        /* Anéis Animados */
        .ring-1 { width: 100%; height: 100%; border-top: 2px solid var(--g); border-bottom: 2px solid var(--g); animation: spin 4s linear infinite; }
        .ring-2 { width: 85%; height: 85%; border-left: 2px solid var(--shield); border-right: 2px solid var(--shield); animation: spin 2s linear reverse infinite; opacity: 0.5; }
        .ring-3 { width: 60%; height: 60%; background: radial-gradient(circle, var(--shield) 0%, transparent 70%); opacity: 0.2; transition: 0.3s; }

        /* Estados */
        .active .ring-3 { opacity: 0.8; transform: scale(1.2); filter: blur(5px); }
        .active .ring-1 { border-color: var(--shield); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* CHAT LATERAL */
        .chat-sidebar { width: 380px; border-left: 1px solid var(--border); background: rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; font-size: 13px; color: #fff; font-family: 'Rajdhani'; line-height: 1.6; }
        .input-box { padding: 20px; border-top: 1px solid var(--border); }
        input { width: 100%; padding: 12px; background: rgba(34, 211, 238, 0.05); border: 1px solid var(--border); color: var(--shield); outline: none; font-family: 'Fira Code'; }

        .sys-log { margin-top: 20px; font-size: 10px; color: var(--g); font-family: 'Orbitron'; text-align: center; }
    </style>
</head>
<body>

    <div id="boot-screen"><div id="bt-text" style="font-size:12px;">> HINA_SYS_INIT_...</div></div>

    <div id="lock-screen">
        <input type="password" id="pass" class="pass-input" placeholder="PASSKEY" maxlength="6">
    </div>

    <div id="app">
        <header class="hdr">
            <div>HINA // PROTOCOLO ALPHA</div>
            <div>STATUS: ENCRYPTED_LINK</div>
        </header>

        <div class="main-engine">
            <div class="visualizer">
                <div class="ring-container" id="engine" onclick="startVoice()">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <div class="ring ring-3"></div>
                    <div style="font-family:'Orbitron'; font-size:10px; z-index:5;">CORE</div>
                </div>
                <div class="sys-log" id="status">SISTEMA EM STANDBY</div>
            </div>

            <aside class="chat-sidebar">
                <div id="chat-flow"></div>
                <div class="input-box">
                    <input type="text" id="cmd" placeholder="CMD_INPUT..." autocomplete="off">
                </div>
            </aside>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const API_URL = "https://groq.com";
        let memory = [{ role: "system", content: "Você é HINA, uma IA de comando. Chame o usuário de Senhor. Seja direta e use linguagem técnica." }];

        const engine = document.getElementById('engine');
        const statusText = document.getElementById('status');

        // VOZ (OUVIR)
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speech = Recognition ? new Recognition() : null;
        if(speech) speech.lang = 'pt-BR';

        function startVoice() {
            if(!speech) return;
            speech.start();
        }

        if(speech) {
            speech.onstart = () => { engine.classList.add('active'); statusText.innerText = "OUVINDO..."; };
            speech.onresult = (e) => askHina(e.results[0].transcript);
            speech.onend = () => { engine.classList.remove('active'); statusText.innerText = "STANDBY"; };
        }

        // VOZ (FALAR)
        function hinaSpeak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'pt-BR';
            utter.onstart = () => { engine.classList.add('active'); statusText.innerText = "TRANSMITINDO..."; };
            utter.onend = () => { engine.classList.remove('active'); statusText.innerText = "STANDBY"; };
            synth.speak(utter);
        }

        // LÓGICA IA
        async function askHina(prompt) {
            appendMsg('USER', prompt);
            memory.push({ role: "user", content: prompt });

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: "llama3-8b-8192", messages: memory })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                
                appendMsg('HINA', reply);
                hinaSpeak(reply);
                memory.push({ role: "assistant", content: reply });
            } catch (e) {
                appendMsg('ERR', "Falha de conexão com o núcleo.");
            }
        }

        function appendMsg(tag, txt) {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin-bottom:15px;"><b style="color:var(--g)">[${tag}]</b> ${txt}</div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        // BOOT & LOGIN
        window.onload = async () => {
            const bt = document.getElementById('bt-text');
            const logs = ["> LINKING_SYSTEM...", "> LOADING_GROQ...", "> SECURITY_CHECK...", "> READY."];
            for(let l of logs) { bt.innerHTML += `<br>${l}`; await new Promise(r => setTimeout(r, 400)); }
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';
        };

        document.getElementById('pass').addEventListener('input', (e) => {
            if(e.target.value === "707070") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                hinaSpeak("Protocolos Alpha ativos. Bem-vindo, Senhor.");
            }
        });

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value) { askHina(e.target.value); e.target.value = ''; }
        });
    </script>
</body>
</html>
