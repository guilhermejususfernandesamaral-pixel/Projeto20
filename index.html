<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINA CORE — PROTOCOLO MARAL-PIXEL</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --g: #d946ef; --bg: #05010a; --shield: #22d3ee; --border: rgba(34, 211, 238, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--shield); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* ABERTURA CINEMÁTICA */
        #boot-screen { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .boot-wrap { text-align: center; width: 80%; max-width: 500px; }
        .hina-id { font-family: 'Orbitron'; font-size: 45px; font-weight: 900; color: var(--g); letter-spacing: 20px; margin-bottom: 20px; text-shadow: 0 0 30px var(--g); }
        .loader-track { width: 100%; height: 1px; background: rgba(255,255,255,0.1); position: relative; margin: 30px 0; }
        .loader-bar { position: absolute; height: 100%; background: var(--shield); width: 0%; transition: width 0.3s; }

        /* LOGIN */
        #lock-screen { display: none; position: fixed; inset: 0; z-index: 9999; background: var(--bg); flex-direction: column; align-items: center; justify-content: center; }
        .pass-input { background: rgba(34, 211, 238, 0.05); border: 1px solid var(--shield); padding: 15px; color: var(--shield); text-align: center; font-size: 24px; font-family: 'Orbitron'; letter-spacing: 8px; outline: none; }

        /* APP */
        #app { display: none; width: 100%; height: 100%; flex-direction: column; background: radial-gradient(circle at center, #0e051a 0%, #05010a 100%); }
        .hdr { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 3px; }

        .main-engine { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hina-core { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; }
        .ring-1 { width: 100%; height: 100%; border-top: 3px solid var(--g); border-bottom: 3px solid var(--g); animation: spin 6s linear infinite; }
        .ring-glow { width: 40%; height: 40%; background: var(--shield); border-radius: 50%; filter: blur(40px); opacity: 0.1; }
        .active .ring-glow { opacity: 0.6; transform: scale(1.5); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .chat-console { width: 100%; max-width: 800px; height: 350px; display: flex; flex-direction: column; background: rgba(0,0,0,0.7); border: 1px solid var(--border); border-radius: 10px; margin-top: 30px; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Fira Code', monospace; font-size: 13px; color: #fff; }
        .input-bar { padding: 15px; border-top: 1px solid var(--border); display: flex; }
        input#cmd { flex: 1; background: transparent; border: none; color: var(--shield); font-family: 'Fira Code'; outline: none; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="boot-wrap">
            <div class="hina-id">HINA</div>
            <div class="loader-track"><div class="loader-bar" id="bar"></div></div>
            <div style="font-family:'Fira Code'; font-size:10px;" id="log-text">INICIALIZANDO...</div>
        </div>
    </div>

    <div id="lock-screen">
        <div style="font-family:'Orbitron'; color:var(--g); margin-bottom:20px; font-size:12px;">SENHA REQUERIDA</div>
        <input type="password" id="pass" class="pass-input" placeholder="******" maxlength="6">
    </div>

    <div id="app">
        <header class="hdr">
            <div>HINA // MARAL-PIXEL</div>
            <div style="color:var(--g)">STATUS: ONLINE</div>
        </header>
        <main class="main-engine">
            <div class="hina-core" id="engine" onclick="startVoice()">
                <div class="ring ring-1"></div>
                <div class="ring ring-glow"></div>
                <div style="font-family:'Orbitron'; font-weight:900; z-index:10; font-size:15px; letter-spacing:5px;">HINA</div>
            </div>
            <div style="font-family:'Orbitron'; font-size:10px; color:var(--g); margin-top:15px;" id="status">CLIQUE NO NÚCLEO</div>
            <div class="chat-console">
                <div id="chat-flow"></div>
                <div class="input-bar">
                    <input type="text" id="cmd" placeholder="Comando para o sistema..." autocomplete="off">
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "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";
        let memory = [{ role: "system", content: "Você é HINA, assistente pessoal do Senhor. Responda de forma curta e tecnológica." }];

        async function awakening() {
            const bar = document.getElementById('bar');
            const steps = [20, 50, 80, 100];
            for (let p of steps) {
                bar.style.width = p + "%";
                await new Promise(r => setTimeout(r, 600));
            }
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';
        }

        window.onload = awakening;

        async function askHina(prompt) {
            if(!prompt) return;
            appendMsg('USER', prompt);
            const engine = document.getElementById('engine');
            engine.classList.add('active');

            try {
                const res = await fetch("https://groq.com", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": `Bearer ${API_KEY}` 
                    },
                    body: JSON.stringify({ 
                        model: "llama-3.1-8b-instant", 
                        messages: [...memory, {role: "user", content: prompt}] 
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                appendMsg('HINA', reply);
                memory.push({role: "user", content: prompt}, {role: "assistant", content: reply});
                
                const utter = new SpeechSynthesisUtterance(reply);
                utter.lang = 'pt-BR';
                window.speechSynthesis.speak(utter);

            } catch (e) {
                appendMsg('ERR', "Erro de conexão. Verifique se a chave API ainda é válida.");
            } finally {
                engine.classList.remove('active');
            }
        }

        function appendMsg(tag, txt) {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin-bottom:10px;"><b>[${tag}]</b> ${txt}</div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        document.getElementById('pass').addEventListener('input', (e) => {
            if(e.target.value === "707070") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
        });

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                askHina(e.target.value);
                e.target.value = '';
            }
        });

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speech = Recognition ? new Recognition() : null;
        if(speech) {
            speech.lang = 'pt-BR';
            speech.onresult = (e) => askHina(e.results[0][0].transcript);
        }
        function startVoice() { speech && speech.start(); }
    </script>
</body>
</html>
