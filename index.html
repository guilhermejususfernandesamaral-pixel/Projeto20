<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINA — CORE V4 STREAMEAR</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --g: #d946ef; --bg: #05010a; --shield: #22d3ee; --border: rgba(34, 211, 238, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* BOOT E LOGIN CENTRALIZADOS */
        #boot-screen, #lock-screen { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-screen { display: none; z-index: 9999; background: var(--bg); }
        .pass-input { background: rgba(34, 211, 238, 0.05); border: 1px solid var(--shield); padding: 15px; color: var(--shield); text-align: center; font-size: 24px; font-family: 'Orbitron'; letter-spacing: 8px; outline: none; border-radius: 4px; }

        /* INTERFACE HINA */
        #app { display: none; width: 100%; height: 100%; flex-direction: column; background: radial-gradient(circle at center, #0e051a 0%, #05010a 100%); }
        .hdr { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; font-size: 11px; color: var(--shield); }

        .main-engine { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hina-core { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; transition: 0.5s; }
        .ring-1 { width: 100%; height: 100%; border-top: 3px solid var(--g); border-bottom: 3px solid var(--g); animation: spin 5s linear infinite; }
        .ring-glow { width: 40%; height: 40%; background: var(--shield); border-radius: 50%; filter: blur(35px); opacity: 0.1; transition: 0.3s; }
        
        /* Ânimo: Pulsação Ativa */
        .active .ring-glow { opacity: 0.7; transform: scale(1.4); }
        .active .ring-1 { border-color: var(--shield); filter: drop-shadow(0 0 15px var(--shield)); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* CONSOLE DE CHAT */
        .chat-console { width: 100%; max-width: 800px; height: 350px; display: flex; flex-direction: column; background: rgba(0,0,0,0.7); border: 1px solid var(--border); border-radius: 10px; margin-top: 25px; backdrop-filter: blur(15px); }
        #chat-flow { flex: 1; overflow-y: auto; padding: 25px; font-family: 'Fira Code', monospace; font-size: 13px; color: #fff; line-height: 1.6; scrollbar-width: thin; }
        .input-bar { padding: 15px; border-top: 1px solid var(--border); display: flex; background: rgba(0,0,0,0.5); }
        input#cmd { flex: 1; background: transparent; border: none; color: var(--shield); font-family: 'Fira Code'; outline: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="boot-screen"><div style="font-family:'Fira Code'; color:var(--shield); font-size:12px;">> SINCRONIZANDO NÚCLEO...</div></div>

    <div id="lock-screen">
        <div style="font-family:'Orbitron'; color:var(--g); margin-bottom:20px; font-size:12px; letter-spacing:5px;">ACESSO RESTRITO</div>
        <input type="password" id="pass" class="pass-input" placeholder="******" maxlength="6" autocomplete="off">
    </div>

    <div id="app">
        <header class="hdr"><div>HINA // MARAL-PIXEL</div><div id="sys-status" style="color:var(--g)">STREAM: ACTIVE</div></header>
        <main class="main-engine">
            <div class="hina-core" id="engine" onclick="startVoice()">
                <div class="ring ring-1"></div><div class="ring ring-glow"></div>
                <div style="font-family:'Orbitron'; font-weight:900; z-index:10; font-size:15px; letter-spacing:3px; color:#fff;">HINA</div>
            </div>
            <div class="chat-console">
                <div id="chat-flow"></div>
                <div class="input-bar"><input type="text" id="cmd" placeholder="Diga algo, Senhor..." autocomplete="off"></div>
            </div>
        </main>
    </div>

    <script>
        /* ═══════════════════════════════════════════════════════
           SCRIPT ORGANIZADO — PROTOCOLO FINAL
           ═══════════════════════════════════════════════════════ */
        const CONFIG = {
            KEY: "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",
            URL: "https://groq.com",
            MODEL: "llama-3.3-70b-versatile" 
        };

        let chatMemory = [{ role: "system", content: "Você é HINA, assistente de elite. Chame o usuário de Senhor. Responda com elegância e termos técnicos." }];
        const engine = document.getElementById('engine');

        // 1. FUNÇÃO DE STREAMING (CONVERSA EM TEMPO REAL)
        async function askHina(prompt) {
            if(!prompt) return;
            appendMsg('USER', prompt);
            engine.classList.add('active');

            const resId = 'hina-' + Date.now();
            appendMsg('HINA', '', resId);
            const resElement = document.getElementById(resId);

            try {
                const response = await fetch(CONFIG.URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${CONFIG.KEY}` },
                    body: JSON.stringify({ 
                        model: CONFIG.MODEL, 
                        messages: [...chatMemory, {role: "user", content: prompt}],
                        temperature: 1, 
                        stream: true 
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            try {
                                const data = JSON.parse(dataStr);
                                const content = data.choices[0].delta.content || "";
                                fullText += content;
                                resElement.innerText = fullText;
                                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
                chatMemory.push({role: "user", content: prompt}, {role: "assistant", content: fullText});
                speak(fullText);

            } catch (err) {
                resElement.innerText = "FALHA NO LINK DE DADOS.";
            } finally {
                engine.classList.remove('active');
            }
        }

        // 2. AUXILIARES E INTERFACE
        function appendMsg(tag, txt, id = '') {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin-bottom:12px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:8px;"><b style="color:var(--g)">[${tag}]</b> <span id="${id}">${txt}</span></div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'pt-BR';
            window.speechSynthesis.speak(utter);
        }

        // 3. BOOT E ACESSO
        window.onload = () => setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';
        }, 1200);

        document.getElementById('pass').addEventListener('input', (e) => {
            if(e.target.value === "707070") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                speak("Protocolos ativos. Como posso ajudá-lo, Senhor?");
            }
        });

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') { askHina(e.target.value); e.target.value = ''; }
        });

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speech = Recognition ? new Recognition() : null;
        if(speech) { speech.lang = 'pt-BR'; speech.onresult = (e) => askHina(e.results[0].transcript); }
        function startVoice() { speech && speech.start(); }
    </script>
</body>
</html>
