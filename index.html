<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINA CORE — PROTOCOLO MARAL-PIXEL</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --g: #d946ef; --bg: #05010a; --shield: #22d3ee; --border: rgba(34, 211, 238, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--shield); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #boot-screen, #lock-screen { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-screen { display: none; z-index: 9999; background: var(--bg); }
        .pass-input { background: rgba(34, 211, 238, 0.05); border: 1px solid var(--shield); padding: 15px; color: var(--shield); text-align: center; font-size: 24px; font-family: 'Orbitron'; letter-spacing: 8px; outline: none; }
        #app { display: none; width: 100%; height: 100%; flex-direction: column; background: radial-gradient(circle at center, #0e051a 0%, #05010a 100%); }
        .hdr { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; font-size: 11px; }
        .main-engine { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hina-core { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; }
        .ring-1 { width: 100%; height: 100%; border-top: 3px solid var(--g); border-bottom: 3px solid var(--g); animation: spin 6s linear infinite; }
        .ring-glow { width: 40%; height: 40%; background: var(--shield); border-radius: 50%; filter: blur(40px); opacity: 0.1; }
        .active .ring-glow { opacity: 0.6; transform: scale(1.5); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .chat-console { width: 100%; max-width: 800px; height: 300px; display: flex; flex-direction: column; background: rgba(0,0,0,0.7); border: 1px solid var(--border); border-radius: 10px; margin-top: 30px; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Fira Code', monospace; font-size: 13px; color: #fff; }
        .input-bar { padding: 15px; border-top: 1px solid var(--border); display: flex; }
        input#cmd { flex: 1; background: transparent; border: none; color: var(--shield); font-family: 'Fira Code'; outline: none; }
    </style>
</head>
<body>
    <div id="boot-screen"><div style="font-family:'Fira Code'; color:var(--shield);">[ REPORTE: INICIALIZANDO NÚCLEO... ]</div></div>
    <div id="lock-screen">
        <div style="font-family:'Orbitron'; color:var(--g); margin-bottom:20px;">SENHA REQUERIDA</div>
        <input type="password" id="pass" class="pass-input" placeholder="******" maxlength="6">
    </div>
    <div id="app">
        <header class="hdr"><div>HINA // MARAL-PIXEL</div><div style="color:var(--g)">STATUS: ONLINE</div></header>
        <main class="main-engine">
            <div class="hina-core" id="engine" onclick="startVoice()">
                <div class="ring ring-1"></div><div class="ring ring-glow"></div>
                <div style="font-family:'Orbitron'; font-weight:900; z-index:10; font-size:15px;">HINA</div>
            </div>
            <div class="chat-console">
                <div id="chat-flow"></div>
                <div class="input-bar"><input type="text" id="cmd" placeholder="Comando..." autocomplete="off"></div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "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";
        let memory = [{ role: "system", content: "Você é HINA, assistente de elite. Chame o usuário de Senhor." }];

        async function askHina(prompt) {
            if(!prompt) return;
            appendMsg('USER', prompt);
            document.getElementById('engine').classList.add('active');

            try {
                // Protocolo de Blindagem para evitar erro de CORS
                const res = await fetch("https://groq.com", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", // Modelo de alta performance
                        messages: [...memory, {role: "user", content: prompt}],
                        temperature: 0.5 
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                const reply = data.choices[0].message.content;
                appendMsg('HINA', reply);
                memory.push({role: "user", content: prompt}, {role: "assistant", content: reply});
                
                const utter = new SpeechSynthesisUtterance(reply);
                utter.lang = 'pt-BR';
                window.speechSynthesis.speak(utter);
            } catch (e) {
                appendMsg('ERR', "Falha no link Groq. Verifique sua cota de uso ou chave.");
                console.error(e);
            } finally {
                document.getElementById('engine').classList.remove('active');
            }
        }

        function appendMsg(tag, txt) {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin-bottom:10px;"><b>[${tag}]</b> ${txt}</div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        window.onload = () => setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';
        }, 2000);

        document.getElementById('pass').addEventListener('input', (e) => {
            if(e.target.value === "707070") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
        });

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') { askHina(e.target.value); e.target.value = ''; }
        });

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speech = Recognition ? new Recognition() : null;
        if(speech) { speech.lang = 'pt-BR'; speech.onresult = (e) => askHina(e.results[0][0].transcript); }
        function startVoice() { speech && speech.start(); }
    </script>
</body>
</html>
