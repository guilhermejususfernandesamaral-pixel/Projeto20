<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINA CORE — PROTOCOLO FINAL</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --g: #d946ef; --bg: #05010a; --shield: #22d3ee; --border: rgba(34, 211, 238, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--shield); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #boot-screen, #lock-screen { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-screen { display: none; z-index: 9999; background: var(--bg); }
        .pass-input { background: rgba(34, 211, 238, 0.05); border: 1px solid var(--shield); padding: 15px; color: var(--shield); text-align: center; font-size: 24px; font-family: 'Orbitron'; letter-spacing: 8px; outline: none; border-radius: 4px; }

        #app { display: none; width: 100%; height: 100%; flex-direction: column; background: radial-gradient(circle at center, #0e051a 0%, #05010a 100%); }
        .hdr { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; font-size: 11px; }
        
        .main-engine { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hina-core { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; transition: 0.5s; }
        .ring-1 { width: 100%; height: 100%; border-top: 3px solid var(--g); border-bottom: 3px solid var(--g); animation: spin 5s linear infinite; }
        .ring-glow { width: 40%; height: 40%; background: var(--shield); border-radius: 50%; filter: blur(35px); opacity: 0.1; transition: 0.3s; }
        .active .ring-glow { opacity: 0.7; transform: scale(1.4); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .chat-console { width: 100%; max-width: 800px; height: 350px; display: flex; flex-direction: column; background: rgba(0,0,0,0.7); border: 1px solid var(--border); border-radius: 10px; margin-top: 25px; backdrop-filter: blur(10px); }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Fira Code', monospace; font-size: 13px; color: #fff; scrollbar-width: thin; }
        .input-bar { padding: 15px; border-top: 1px solid var(--border); display: flex; }
        input#cmd { flex: 1; background: transparent; border: none; color: var(--shield); font-family: 'Fira Code'; outline: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="boot-screen"><div style="font-family:'Fira Code'; color:var(--shield); font-size: 12px;">> REESTRUTURANDO NÚCLEO HINA...</div></div>

    <div id="lock-screen">
        <div style="font-family:'Orbitron'; color:var(--g); margin-bottom:20px; font-size: 12px; letter-spacing: 5px;">SENHA DO SENHOR</div>
        <input type="password" id="pass" class="pass-input" placeholder="******" maxlength="6" autocomplete="off">
    </div>

    <div id="app">
        <header class="hdr"><div>HINA // MARAL-PIXEL</div><div style="color:var(--g)">PROTOCOLO: ESTÁVEL</div></header>
        <main class="main-engine">
            <div class="hina-core" id="engine" onclick="startVoice()">
                <div class="ring ring-1"></div><div class="ring ring-glow"></div>
                <div style="font-family:'Orbitron'; font-weight:900; z-index:10; font-size:15px; letter-spacing: 3px;">HINA</div>
            </div>
            <div class="chat-console">
                <div id="chat-flow"></div>
                <div class="input-bar"><input type="text" id="cmd" placeholder="Diga algo, Senhor..." autocomplete="off"></div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "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";
        let memory = [{ role: "system", content: "Você é HINA, assistente de elite. Chame o usuário de Senhor. Responda de forma curta e técnica." }];

        async function askHina(prompt) {
            if(!prompt) return;
            appendMsg('USER', prompt);
            const engine = document.getElementById('engine');
            engine.classList.add('active');

            try {
                // Mudança estratégica: Desativei o 'stream' para evitar o erro de link
                const response = await fetch("https://groq.com", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile",
                        messages: [...memory, {role: "user", content: prompt}],
                        temperature: 0.7,
                        stream: false // MODO ESTÁVEL PARA CELULAR
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    appendMsg('HINA', reply);
                    memory.push({role: "user", content: prompt}, {role: "assistant", content: reply});
                    
                    const synth = window.speechSynthesis;
                    const utter = new SpeechSynthesisUtterance(reply);
                    utter.lang = 'pt-BR';
                    synth.speak(utter);
                } else {
                    throw new Error("Erro de resposta");
                }

            } catch (err) {
                appendMsg('ERR', "Senhor, a segurança do navegador bloqueou o link. Tente atualizar a página.");
                console.error(err);
            } finally {
                engine.classList.remove('active');
            }
        }

        function appendMsg(tag, txt) {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin-bottom:12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;"><b>[${tag}]</b> ${txt}</div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        window.onload = () => setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';
        }, 1500);

        document.getElementById('pass').addEventListener('input', (e) => {
            if(e.target.value === "707070") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
        });

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') { askHina(e.target.value); e.target.value = ''; }
        });

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speech = Recognition ? new Recognition() : null;
        if(speech) { speech.lang = 'pt-BR'; speech.onresult = (e) => askHina(e.results.transcript); }
        function startVoice() { speech && speech.start(); }
    </script>
</body>
</html>
