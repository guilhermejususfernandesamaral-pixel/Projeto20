<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HINA CORE — VOICE EVOLUTION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --g: #d946ef; --pk: #f472b6; --bg: #05010a; --txt: #fce7f3; 
            --border: rgba(217, 70, 239, 0.2); --shield: #22d3ee;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; }

        /* ABERTURA E LOGIN */
        #boot-screen, #lock-screen { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-screen { z-index: 9999; background: var(--bg); display: none; }
        .pass-input { background: transparent; border: none; border-bottom: 2px solid var(--g); padding: 10px; color: var(--g); text-align: center; font-size: 28px; font-family: 'Orbitron'; letter-spacing: 12px; outline: none; width: 280px; }

        /* INTERFACE PRINCIPAL */
        #app { display: none; flex-direction: column; height: 100vh; }
        .hdr { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .main { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* CORAÇÃO BOTÃO MESTRE (VOZ) */
        .core-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0525 0%, #05010a 100%); }
        .heart-trigger { position: relative; cursor: pointer; transition: 0.3s; z-index: 10; }
        .heart-trigger:active { transform: scale(0.9); }
        
        .heart {
            position: relative; width: 120px; height: 110px; background: var(--g); transform: rotate(-45deg);
            box-shadow: 0 0 40px var(--g); animation: pulse 1.5s infinite ease-in-out;
        }
        .heart::before, .heart::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--g); border-radius: 50%; }
        .heart::before { top: -60px; left: 0; }
        .heart::after { top: 0; left: 60px; }

        /* ESTADOS */
        .heart.listening { background: var(--shield); box-shadow: 0 0 60px var(--shield); animation: pulse 0.6s infinite alternate; }
        .heart.talking { background: var(--pk); box-shadow: 0 0 80px var(--pk); animation: pulse 0.3s infinite alternate; }

        @keyframes pulse { 0% { transform: rotate(-45deg) scale(1); } 50% { transform: rotate(-45deg) scale(1.1); } 100% { transform: rotate(-45deg) scale(1); } }

        /* CHAT E INPUT */
        .chat-overlay { width: 350px; border-left: 1px solid var(--border); background: rgba(0,0,0,0.85); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; }
        .input-zone { padding: 15px; background: #000; border-top: 1px solid var(--border); }
        input#cmd { width: 100%; padding: 12px; background: #11081a; border: 1px solid var(--g); color: #fff; border-radius: 5px; outline: none; }
        
        .hint { margin-top: 50px; font-family: 'Orbitron'; font-size: 10px; color: var(--g); letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body>

    <div id="boot-screen"><div style="font-family:'Fira Code'; color:var(--shield); font-size:12px;">> HINA_CORE_v4 // ATIVANDO MÓDULO DE VOZ...</div></div>

    <div id="lock-screen">
        <div style="font-family:'Orbitron'; color:var(--g); letter-spacing:3px; font-size:11px; margin-bottom:15px;">ACESSO BIOMÉTRICO VOCAL</div>
        <input type="password" class="pass-input" id="pass" maxlength="6" placeholder="000000">
    </div>

    <div id="app">
        <header class="hdr">
            <div style="font-family:'Orbitron'; font-weight:900; color:var(--g); letter-spacing:4px;">HINA<span>.AI</span></div>
            <div style="color:var(--shield); font-size:11px;">VOICE_SENSORS: ACTIVE</div>
        </header>

        <div class="main">
            <section class="core-display">
                <div class="heart-trigger" onclick="startVoice()">
                    <div class="heart" id="hina-heart"></div>
                </div>
                <div class="hint" id="status-txt">TOQUE NO CORAÇÃO PARA FALAR</div>
            </section>

            <aside class="chat-overlay">
                <div id="chat-flow"></div>
                <div class="input-zone">
                    <input type="text" id="cmd" placeholder="Ou digite aqui, Senhor..." autocomplete="off">
                </div>
            </aside>
        </div>
    </div>

    <script>
        const REPORTER = "maral-pixel";
        const API_KEY = "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";
        const API_URL = "https://groq.com";
        
        let memory = [{ role: "system", content: "Você é HINA, assistente de elite do Senhor. Seja curta, elegante e tecnológica. Responda sempre chamando-o de Senhor." }];

        const heart = document.getElementById('hina-heart');
        const status = document.getElementById('status-txt');

        // 1. RECONHECIMENTO DE VOZ (OUVIR)
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speechApi = Recognition ? new Recognition() : null;
        if(speechApi) speechApi.lang = 'pt-BR';

        function startVoice() {
            if(!speechApi) return appendMsg('hina', "Senhor, este dispositivo não suporta sensores de voz.");
            speechApi.start();
        }

        if(speechApi) {
            speechApi.onstart = () => {
                heart.classList.add('listening');
                status.innerText = "ESCUTANDO SENHOR...";
            };
            speechApi.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                askHina(transcript);
            };
            speechApi.onend = () => {
                heart.classList.remove('listening');
                status.innerText = "TOQUE PARA FALAR";
            };
        }

        // 2. SÍNTESE DE VOZ (FALAR)
        function hinaSpeak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.1; // Velocidade tecnológica
            utterance.pitch = 1.2; // Tom feminino assistente
            
            utterance.onstart = () => heart.classList.add('talking');
            utterance.onend = () => heart.classList.remove('talking');
            
            window.speechSynthesis.speak(utterance);
        }

        // 3. LOGICA HINA
        async function askHina(prompt) {
            appendMsg('user', prompt);
            memory.push({ role: "user", content: prompt });

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: "llama3-8b-8192", messages: memory })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                appendMsg('hina', reply);
                hinaSpeak(reply); // Hina fala a resposta
                memory.push({ role: "assistant", content: reply });
            } catch (err) {
                appendMsg('hina', "Senhor, falha crítica no núcleo Groq.");
            }
        }

        // BOOT E LOGIN
        window.onload = () => setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';
        }, 1500);

        document.getElementById('pass').addEventListener('input', (e) => {
            if(e.target.value === "707070") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                hinaSpeak(`Sistemas de voz ativos. Estou aguardando, Senhor.`);
            }
        });

        function appendMsg(sender, text) {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin-bottom:15px;"><b>${sender.toUpperCase()}:</b> ${text}</div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value) {
                askHina(e.target.value);
                e.target.value = '';
            }
        });
    </script>
</body>
</html>
